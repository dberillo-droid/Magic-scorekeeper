<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#0a0a0f"/>
  <defs>
    <radialGradient id="glow2" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#7c6fff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bolt2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#glow2)"/>
  <!-- pentagon -->
  <polygon points="256,52 456,192 380,420 132,420 56,192" fill="none" stroke="#1e1b3a" stroke-width="3"/>
  <!-- glow behind bolt -->
  <path d="M288 80 L192 262 H256 L224 432 L330 234 H266 Z" fill="#7c6fff" opacity="0.18" filter="url(#blur)"/>
  <!-- lightning bolt -->
  <path d="M288 80 L192 262 H256 L224 432 L330 234 H266 Z" fill="url(#bolt2)" opacity="0.97"/>
  <path d="M288 80 L192 262 H256 L224 432 L330 234 H266 Z" fill="none" stroke="#e9d5ff" stroke-width="2" opacity="0.35"/>
</svg>
